services:
  celery_worker:
    # runtime: nvidia 是最稳定的 GPU 透传方式, 要求宿主机已安装 nvidia-container-toolkit
    # 并执行过 nvidia-ctk runtime configure --runtime=docker && systemctl restart docker
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CUDA_VISIBLE_DEVICES=0
