services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: examiner_api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8000"
    restart: always
    env_file: .env
    environment:
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    # 宿主机绑定挂载: 让 api / celery_worker / 宿主机三方共享同一份文件视图
    # uploads/  原始上传视频
    # outputs/  AI 流水线生成的标注视频(姿态骨架/关键点/动作标签/语音字幕)
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
    networks:
      - examiner

  celery_worker:
    build:
      context: .
      dockerfile: ai_engine/Dockerfile
      # build 阶段代理 (pip / 模型预下载需要联网)
      # 网关 IP 已在 networks.examiner 固定为 172.28.0.1, 重启不漂移
      args:
        - HTTP_PROXY=http://172.17.0.1:10809
        - HTTPS_PROXY=http://172.17.0.1:10809
        - http_proxy=http://172.17.0.1:10809
        - https_proxy=http://172.17.0.1:10809
    container_name: examiner_worker
    command: celery -A backend.app.tasks.celery_app worker --loglevel=info --concurrency=1
    depends_on:
      - api
      - redis
      - db
    restart: always
    env_file: .env
    environment:
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      # 运行时代理: pyannote 加载 HF 模型 / FunASR 加载 ModelScope 都走 v2ray
      # NO_PROXY 必须涵盖 docker 内部服务名与本地回环, 否则 redis/db/api 走代理会失败
      - HTTP_PROXY=http://172.17.0.1:10809
      - HTTPS_PROXY=http://172.17.0.1:10809
      - http_proxy=http://172.17.0.1:10809
      - https_proxy=http://172.17.0.1:10809
      - NO_PROXY=localhost,127.0.0.1,db,redis,api,frontend,examiner_db,examiner_redis,examiner_api,examiner_frontend,modelscope.cn,modelscope.com,whisper-api,funasr,celery_worker,flower
      - no_proxy=localhost,127.0.0.1,db,redis,api,frontend,examiner_db,examiner_redis,examiner_api,examiner_frontend,modelscope.cn,modelscope.com,whisper-api,funasr,celery_worker,flower
    # celery_worker 同样绑定到宿主机 uploads / outputs, 与 api 容器共享读写
    # model_cache 仍使用命名卷, 用于缓存 HuggingFace / Ultralytics 等模型权重
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - model_cache:/root/.cache
    networks:
      - examiner

  redis:
    image: redis:7-alpine
    container_name: examiner_redis
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - examiner

  db:
    image: postgres:16-alpine
    container_name: examiner_db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-emergency_examiner}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - examiner

  frontend:
    # image: frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: examiner_frontend
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - examiner

  flower:
    image: mher/flower:latest
    container_name: examiner_flower
    command: celery --broker=redis://redis:6379/0 flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery_worker
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    networks:
      - examiner

  whisper-api:
    image: onerahmet/openai-whisper-asr-webservice
    # 当前服务器 NVIDIA 服务异常 (nvidia-persistenced socket missing), 暂用 CPU 模式.
    # CPU 推理: large-v3 + int8 量化, 5min 音频约 3-5 分钟. 待 GPU 恢复后可改回 :latest + 加 deploy.resources.devices.
    ports:
      - "9000:9000"
    environment:
      # CPU 模式下 large-v3 配合 faster_whisper + int8 量化可保证字准率, 5 分钟音频 ~3 分钟出结果.
      # 如需更快可逐级降级 large-v3 → large-v2 → medium, 字准率换速度.
      - ASR_MODEL=large-v3
      - ASR_ENGINE=faster_whisper      # CPU 上比 openai-whisper 快 4x
      - ASR_LANGUAGE=zh
      - ASR_QUANTIZATION=int8          # CPU 量化, 显著降内存与推理时间
      - OMP_NUM_THREADS=4               # CPU 线程数; 服务器物理核多可调大
      # HF 在国内被墙, faster-whisper 默认从 huggingface.co/Systran 拉 large-v3 必须走 v2ray.
      # 模型缓存 mount 到 /root/.cache/whisper, HF_HOME 指过去, 一次下载永久缓存.
      - HF_HOME=/root/.cache/whisper
      - HTTPS_PROXY=http://172.17.0.1:10809
      - HTTP_PROXY=http://172.17.0.1:10809
      - https_proxy=http://172.17.0.1:10809
      - http_proxy=http://172.17.0.1:10809
      - NO_PROXY=localhost,127.0.0.1,modelscope.cn,modelscope.com,oss-cn-hangzhou.aliyuncs.com,*.aliyuncs.com,db,redis,api,frontend,examiner_db,examiner_redis,examiner_api,examiner_frontend,funasr,celery_worker,flower
      - no_proxy=localhost,127.0.0.1,modelscope.cn,modelscope.com,oss-cn-hangzhou.aliyuncs.com,*.aliyuncs.com,db,redis,api,frontend,examiner_db,examiner_redis,examiner_api,examiner_frontend,funasr,celery_worker,flower
    volumes:
      - /data/sdb/whisper/whisper_models:/root/.cache/whisper
    restart: unless-stopped
    networks:
      - examiner

  funasr:
    # FunASR runtime SDK CPU 镜像, 默认 ENTRYPOINT 是 /bin/bash (不自启 server),
    # 之前那个跑了 5 天的容器是手动 docker exec 进去执行 run_server.sh 起的, 容器重建会丢.
    # 这里用 command 显式启动 run_server.sh, 让 compose 一次起来.
    image: registry.cn-hangzhou.aliyuncs.com/funasr_repo/funasr:funasr-runtime-sdk-cpu-0.4.6
    container_name: funasr
    privileged: true
    ports:
      - "10095:10095"
    volumes:
      - /data/sdb/funasr-runtime-resources/funasr_server.log:/workspace/funasr_server.log
      - /data/sdb/funasr-runtime-resources/models:/workspace/models
      # 启动脚本 mount 进容器, 改名为 start_funasr.sh 避免和镜像内置 /workspace/FunASR/runtime/run_server.sh 重名
      - ./run_server.sh:/start_funasr.sh:ro
    restart: unless-stopped
    # 首启需要从 modelscope.cn 拉模型. modelscope 在国内, 容器内若 DNS/路由异常仍可能失败,
    # 这里同时提供 v2ray 代理兜底; NO_PROXY 把 modelscope 域名排除以走直连优先.
    environment:
      - HTTPS_PROXY=http://172.17.0.1:10809
      - HTTP_PROXY=http://172.17.0.1:10809
      - https_proxy=http://172.17.0.1:10809
      - http_proxy=http://172.17.0.1:10809
      - NO_PROXY=localhost,127.0.0.1,modelscope.cn,modelscope.com,oss-cn-hangzhou.aliyuncs.com,*.aliyuncs.com,db,redis,api,frontend,examiner_db,examiner_redis,examiner_api,examiner_frontend,whisper-api,celery_worker,flower
      - no_proxy=localhost,127.0.0.1,modelscope.cn,modelscope.com,oss-cn-hangzhou.aliyuncs.com,*.aliyuncs.com,db,redis,api,frontend,examiner_db,examiner_redis,examiner_api,examiner_frontend,whisper-api,celery_worker,flower
    # 启动逻辑全部挪到外部脚本 ./run_server.sh, 通过上面的 volume mount 到容器 /start_funasr.sh.
    # 好处: 解决了 YAML `>` 折叠 + bash 反斜杠续行不兼容的问题 (之前 inline 命令报
    # `--download-model-dir: command not found`); 脚本内还做了 server 进程存活检查 + 启动失败堆栈打印.
    command: ["bash", "/start_funasr.sh"]
    networks:
      - examiner

volumes:
  db_data:
  redis_data:
  # 注意: uploads / outputs 已改为宿主机绑定挂载, 不再使用命名卷
  model_cache:

networks:
  examiner:
    driver: bridge
    # 固定子网与网关, 避免 docker / 宿主机重启时 bridge IP 漂移导致 v2ray 代理失效.
    # 宿主机 v2ray 监听 0.0.0.0:10809 时, 网关 172.17.0.1:10809 即可作为容器代理.
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1
