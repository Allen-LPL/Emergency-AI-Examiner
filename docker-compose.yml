services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: examiner_api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8000"
    restart: always
    env_file: .env
    environment:
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    # 宿主机绑定挂载: 让 api / celery_worker / 宿主机三方共享同一份文件视图
    # uploads/  原始上传视频
    # outputs/  AI 流水线生成的标注视频(姿态骨架/关键点/动作标签/语音字幕)
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
    networks:
      - examiner

  celery_worker:
    build:
      context: .
      dockerfile: ai_engine/Dockerfile
      args:
        - HTTP_PROXY=http://172.17.0.1:10809
        - HTTPS_PROXY=http://172.17.0.1:10809
        - http_proxy=http://172.17.0.1:10809
        - https_proxy=http://172.17.0.1:10809
    container_name: examiner_worker
    command: celery -A backend.app.tasks.celery_app worker --loglevel=info --concurrency=1
    depends_on:
      - api
      - redis
      - db
    restart: always
    env_file: .env
    environment:
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    # celery_worker 同样绑定到宿主机 uploads / outputs, 与 api 容器共享读写
    # model_cache 仍使用命名卷, 用于缓存 HuggingFace / Ultralytics 等模型权重
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - model_cache:/root/.cache
    networks:
      - examiner

  redis:
    image: redis:7-alpine
    container_name: examiner_redis
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - examiner

  db:
    image: postgres:16-alpine
    container_name: examiner_db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-emergency_examiner}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - examiner

  frontend:
    # image: frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: examiner_frontend
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - examiner

  flower:
    image: mher/flower:latest
    container_name: examiner_flower
    command: celery --broker=redis://redis:6379/0 flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery_worker
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    networks:
      - examiner

volumes:
  db_data:
  redis_data:
  # 注意: uploads / outputs 已改为宿主机绑定挂载, 不再使用命名卷
  model_cache:

networks:
  examiner:
    driver: bridge
